<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="צור קשר עם סטודיו שמשון - טופס יצירת קשר, פרטי התקשרות ורשתות חברתיות.">
  <title>צור קשר - שמשון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">שמשון<span>.</span></a>
      <button class="menu-toggle" aria-label="תפריט ניווט">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" role="navigation">
        <a href="index.html">בית</a>
        <a href="works.html">עבודות</a>
        <a href="about.html">אודות</a>
        <a href="services.html">שירותים</a>
        <a href="contact.html" class="active">צור קשר</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-page">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info-section fade-in">
            <h1>בואו נדבר</h1>
            <p>רוצים לשמוע עוד? יש שאלה? או סתם רוצים להגיד שלום? מלאו את הטופס ואחזור אליכם בהקדם.</p>

            <div class="contact-details">
              <div class="contact-detail-item">
                <div class="icon">@</div>
                <div>
                  <div class="detail-label">אימייל</div>
                  <div class="detail-value">hello@shimshon.co.il</div>
                </div>
              </div>
              <div class="contact-detail-item">
                <div class="icon">*</div>
                <div>
                  <div class="detail-label">טלפון</div>
                  <div class="detail-value">050-000-0000</div>
                </div>
              </div>
              <div class="contact-detail-item">
                <div class="icon">#</div>
                <div>
                  <div class="detail-label">מיקום</div>
                  <div class="detail-value">תל אביב, ישראל</div>
                </div>
              </div>
            </div>

            <h3 style="font-size: 0.9rem; font-weight: 500; margin-bottom: 14px; color: var(--color-text-light);">רשתות חברתיות</h3>
            <div class="social-links">
              <a href="#" class="social-link" target="_blank" rel="noopener">Li</a>
              <a href="#" class="social-link" target="_blank" rel="noopener">Be</a>
              <a href="#" class="social-link" target="_blank" rel="noopener">Ig</a>
              <a href="#" class="social-link" target="_blank" rel="noopener">Dr</a>
            </div>
          </div>

          <form class="contact-form fade-in" id="contactForm" novalidate>
            <div class="form-group">
              <label for="name">שם מלא</label>
              <input type="text" id="name" name="name" required placeholder="השם שלך">
            </div>
            <div class="form-group">
              <label for="email">אימייל</label>
              <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="message">הודעה</label>
              <textarea id="message" name="message" required placeholder="ספרו לי על הפרויקט שלכם..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-large" style="align-self: flex-start;">שליחה</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-copyright">&copy; 2026 שמשון - סטודיו לעיצוב גרפי</div>
      <div class="footer-links">
        <a href="about.html">אודות</a>
        <a href="services.html">שירותים</a>
        <a href="contact.html">צור קשר</a>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
